<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helmet Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: #f7f7ff;
            border-color: #764ba2;
        }
        
        .preview {
            margin-top: 20px;
            text-align: center;
        }
        
        .preview img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            margin: 20px;
            display: none;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            margin-top: 30px;
            display: none;
        }
        
        .stats {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .stats h2 {
            color: #667eea;
            font-size: 2rem;
        }
        
        .result-image {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .result-image img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        
        .detection-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🪖 Helmet Detection System</h1>
            <p>Upload an image to detect helmets using YOLOv8</p>
        </div>
        
        <div class="card">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*" style="display: none">
                <div style="font-size: 48px;">📸</div>
                <h3>Click to upload image</h3>
                <p>Supports JPG, PNG, JPEG</p>
            </div>
            
            <div class="preview" id="preview"></div>
            
            <div style="text-align: center;">
                <button class="btn" id="detectBtn" onclick="detect()" disabled>🔍 Detect Helmets</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">AI is analyzing the image...</p>
            </div>
            
            <div class="error" id="error"></div>
            
            <div class="results" id="results">
                <div class="stats">
                    <h2 id="count">0</h2>
                    <p>Helmet(s) Detected</p>
                </div>
                <div class="result-image" id="resultImage"></div>
                <div id="detections"></div>
            </div>
        </div>
    </div>
    
    <script>
        let selectedFile = null;
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('preview').innerHTML = `
                        <img src="${event.target.result}" alt="Preview">
                    `;
                    document.getElementById('detectBtn').disabled = false;
                    document.getElementById('results').style.display = 'none';
                    document.getElementById('error').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });
        
        async function detect() {
            if (!selectedFile) return;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('detectBtn').disabled = true;
            document.getElementById('error').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            
            try {
                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('count').innerHTML = data.count;
                    document.getElementById('resultImage').innerHTML = `
                        <img src="data:image/jpeg;base64,${data.image}" alt="Detection Result">
                    `;
                    
                    let detectionsHtml = '';
                    data.detections.forEach((det, i) => {
                        detectionsHtml += `
                            <div class="detection-item">
                                <strong>#${i + 1}</strong> - ${det.class} <br>
                                Confidence: ${(det.confidence * 100).toFixed(1)}%
                            </div>
                        `;
                    });
                    
                    if (data.detections.length === 0) {
                        detectionsHtml = '<p>No helmets detected in this image.</p>';
                    }
                    
                    document.getElementById('detections').innerHTML = detectionsHtml;
                    document.getElementById('results').style.display = 'block';
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').innerHTML = `
                        <strong>⚠️ Error:</strong> ${data.error}
                    `;
                }
                
            } catch (error) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `
                    <strong>⚠️ Error:</strong> ${error.message}<br>
                    <small>The API may be waking up. Please wait 30 seconds and try again.</small>
                `;
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('detectBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
